# copilot-core — self-hosting config
# This repo IS the core. Opening a Claude Code session here means working
# on the system itself (rules, managers, skills, conventions, RDDs), not
# on a downstream product. Editing files in rules/, agents/, skills/
# propagates instantly to every project via sync.sh symlinks in ~/.claude/.

project:
  name: copilot-core
  description: Canonical core of the multi-agent copilot system — Leo + Managers + universal rules + skills + conventions. Dogfooded by opening Leo here to evolve the system itself.
  repos:
    main: ~/Github/copilot-core
  stack:
    - markdown (rules, agent files, skills, docs)
    - yaml (frontmatter, config)
    - bash (scripts/sync.sh, helpers)
    - claude-code-harness

locales:
  # project_files is locked to EN in the core. All committed artifacts
  # (rules, agents, skills, docs, RDDs, commits, PRs, issues) must be in
  # English so any contributor can read and extend the system.
  project_files: en
  # interaction (Leo ↔ founder conversational language) is a local choice.
  # It lives in .claude/project-config.local.yml (gitignored) so each
  # contributor picks their own without touching the committed config.
  # If unset, Leo defaults to matching the founder's prompt language.

self_hosting: true
# Signals to Leo: this is the core itself. Extra escalation discipline
# applies for any edit in rules/, agents/, skills/ per escalation-triggers.md.
# See context/self-hosting-notes.md for the full set of care rules.
