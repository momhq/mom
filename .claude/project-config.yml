# LEO (Living Ecosystem Orchestrator) — self-hosting config
# This repo IS the core. Opening a Claude Code session here means working
# on the system itself (KB, managers, skills, conventions, RDDs), not
# on a downstream product. Changes to .claude/kb/ propagate to all projects
# via sync.sh symlinks in ~/.claude/.

project:
  name: leo-core
  description: LEO — Living Ecosystem Orchestrator. Multi-agent system core with JSON Knowledge Base, neural tag connections, and Token Economy (AI thinks, scripts execute). Dogfooded by opening Leo here to evolve the system itself.
  repos:
    main: ~/Github/leo-core
  stack:
    - json (KB docs, schema, index — .claude/kb/)
    - bash (KB scripts — validate, build-index, check-stale)
    - markdown (CLAUDE.md bootloader, agent definitions — platform constraint)
    - yaml (frontmatter, config)
    - node-typescript (CLI — cli/)
    - claude-code-hooks (automated KB maintenance)

locales:
  # project_files is locked to EN in the core. All committed artifacts
  # (KB docs, agents, skills, docs, RDDs, commits, PRs, issues) must be in
  # English so any contributor can read and extend the system.
  project_files: en
  # interaction (Leo ↔ owner conversational language) is a local choice.
  # It lives in .claude/project-config.local.yml (gitignored) so each
  # contributor picks their own without touching the committed config.
  # If unset, Leo defaults to matching the owner's prompt language.

self_hosting: true
# Signals to Leo: this is the core itself. Extra escalation discipline
# applies for any edit in .claude/kb/, agents/, skills/ per escalation-triggers rule.
# See self-hosting-notes KB doc for the full set of care rules.
