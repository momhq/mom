# LEO (Living Ecosystem Orchestrator) — self-hosting config
# This repo IS the core. Opening a Claude Code session here means working
# on the system itself (Go CLI, KB, CLAUDE.md bootloader), not on a
# downstream product. Changes to .leo/kb/ propagate to downstream
# projects via `leo update`.

project:
  name: leo-core
  description: LEO — Living Ecosystem Orchestrator. Go CLI tool that bootstraps and manages AI-native knowledge bases across projects. JSON KB with neural tag connections and Token Economy (Opus thinks, Sonnet executes, scripts are free). Dogfooded by opening Leo here to evolve the system itself.
  repos:
    main: ~/Github/leo-core
  stack:
    - golang (CLI — cli/)
    - json (KB docs, schema, index — .leo/kb/)
    - bash (KB scripts — validate, build-index, check-stale)
    - markdown (CLAUDE.md bootloader — platform constraint)
    - yaml (config)
    - claude-code-hooks (automated KB maintenance)

locales:
  # project_files is locked to EN in the core. All committed artifacts
  # (KB docs, commits, PRs, issues) must be in English so any contributor
  # can read and extend the system.
  project_files: en
  # interaction (Leo ↔ owner conversational language) is a local choice.
  # It lives in .claude/project-config.local.yml (gitignored) so each
  # contributor picks their own without touching the committed config.
  # If unset, Leo defaults to matching the owner's prompt language.

self_hosting: true
# Signals to Leo: this is the core itself. Extra escalation discipline
# applies for any edit in .leo/kb/ per escalation-triggers rule.
# See self-hosting-notes KB doc for the full set of care rules.
