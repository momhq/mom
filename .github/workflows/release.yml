name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: cli/go.sum

      - name: Run tests
        run: go test ./...

      - name: Build all platforms
        run: make build-all

      - name: Create GitHub Release
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          cd bin
          # Compress binaries
          for f in mom-*; do
            gzip -k "$f"
          done
          cd ..
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            bin/mom-*.gz
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew tap
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          # Get the source tarball SHA
          TARBALL_URL="https://github.com/momhq/mom/archive/refs/tags/${TAG}.tar.gz"
          SHA256=$(curl -sL "$TARBALL_URL" | sha256sum | awk '{print $1}')
          # Dispatch to homebrew-tap repo
          gh api repos/momhq/homebrew-tap/dispatches \
            -f event_type=update-formula \
            -f "client_payload[version]=$VERSION" \
            -f "client_payload[sha256]=$SHA256" \
            -f "client_payload[url]=$TARBALL_URL"
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
